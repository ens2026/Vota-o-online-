<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votação Oficial - Tempo Real</title>
    
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-color: #f8fafc;
            --color-pt: #ef4444;
            --color-pl: #22c55e;
            --color-branco: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .title-trigger {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 20px;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bold;
            user-select: none;
        }

        .results-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 200px;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            width: 70px;
        }

        .bar {
            width: 100%;
            border-radius: 8px 8px 4px 4px;
            transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 5px;
            position: relative;
        }

        .bar-value {
            position: absolute;
            top: -30px;
            font-size: 0.9rem;
            width: 100%;
            font-weight: bold;
        }

        .bar-label {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: bold;
        }

        .vote-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn:active { transform: scale(0.94); }
        .btn-pt { background-color: var(--color-pt); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-pl { background-color: var(--color-pl); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-white { grid-column: span 2; background: transparent; border: 2px solid var(--color-branco); color: var(--color-branco); margin-top: 5px; }

        #admin-panel {
            display: none;
            background: #000;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px dashed yellow;
        }

        #admin-panel input {
            width: 60px;
            margin: 5px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .btn-save {
            background: yellow;
            color: black;
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-trigger" id="titleTrigger">● RESULTADOS EM TEMPO REAL</div>
    
    <div class="results-container">
        <div class="bar-wrapper">
            <div id="bar-pt" class="bar" style="background-color: var(--color-pt);"><span class="bar-value" id="val-pt">0</span></div>
            <span class="bar-label">PT</span>
        </div>
        <div class="bar-wrapper">
            <div id="bar-pl" class="bar" style="background-color: var(--color-pl);"><span class="bar-value" id="val-pl">0</span></div>
            <span class="bar-label">PL</span>
        </div>
        <div class="bar-wrapper">
            <div id="bar-white" class="bar" style="background-color: var(--color-branco);"><span class="bar-value" id="val-white">0</span></div>
            <span class="bar-label">BRANCO</span>
        </div>
    </div>

    <div class="vote-grid">
        <a href="https://mpago.la/2xujLCz" class="btn btn-pt" id="btnPT">VOTAR PT</a>
        <a href="https://mpago.la/1MHzq8x" class="btn btn-pl" id="btnPL">VOTAR PL</a>
        <a href="https://mpago.la/2eEcMJY" class="btn btn-white" id="btnWhite">VOTAR EM BRANCO</a>
    </div>

    <div id="admin-panel">
        <p style="color: yellow; font-size: 12px;">MANIPULAR NUVEM</p>
        <input type="number" id="in-pt">
        <input type="number" id="in-pl">
        <input type="number" id="in-br">
        <button class="btn-save" id="btnSave">SINCRONIZAR TUDO</button>
    </div>
</div>

<script type="module">
    // Importação dos módulos do Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, runTransaction } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    // Suas credenciais enviadas
    const firebaseConfig = {
        apiKey: "AIzaSyBIr3kJTpFtQwlHtDhF73yHcSFJjc4L0t4",
        authDomain: "votacao-teste-ccb1b.firebaseapp.com",
        databaseURL: "https://votacao-teste-ccb1b-default-rtdb.firebaseio.com",
        projectId: "votacao-teste-ccb1b",
        storageBucket: "votacao-teste-ccb1b.firebasestorage.app",
        messagingSenderId: "55550163606",
        appId: "1:55550163606:web:592bdb970765fede0d60b7"
    };

    // Inicialização
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let votosGlobais = { pt: 0, pl: 0, white: 0 };

    // 1. Ouvir mudanças no banco em tempo real
    const votosRef = ref(db, 'votos');
    onValue(votosRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            votosGlobais = data;
            atualizarInterface();
        }
    });

    // 2. Lógica para processar voto ao voltar do Mercado Pago
    const pendente = localStorage.getItem('votoPendente');
    if (pendente) {
        const itemRef = ref(db, 'votos/' + pendente);
        runTransaction(itemRef, (currentValue) => {
            return (currentValue || 0) + 1;
        });
        localStorage.removeItem('votoPendente');
    }

    // Funções de Interface
    function atualizarInterface() {
        const total = (votosGlobais.pt || 0) + (votosGlobais.pl || 0) + (votosGlobais.white || 0);
        
        const updateBar = (id, valId, value) => {
            const h = total > 0 ? (value / total) * 100 : 5;
            document.getElementById(id).style.height = Math.max(h, 5) + '%';
            document.getElementById(valId).innerText = value || 0;
        };

        updateBar('bar-pt', 'val-pt', votosGlobais.pt);
        updateBar('bar-pl', 'val-pl', votosGlobais.pl);
        updateBar('bar-white', 'val-white', votosGlobais.white);
    }

    // Eventos de Clique
    document.getElementById('btnPT').onclick = () => localStorage.setItem('votoPendente', 'pt');
    document.getElementById('btnPL').onclick = () => localStorage.setItem('votoPendente', 'pl');
    document.getElementById('btnWhite').onclick = () => localStorage.setItem('votoPendente', 'white');

    // Painel Secreto (3 cliques)
    let clicks = 0;
    document.getElementById('titleTrigger').onclick = () => {
        clicks++;
        if (clicks >= 3) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('in-pt').value = votosGlobais.pt || 0;
            document.getElementById('in-pl').value = votosGlobais.pl || 0;
            document.getElementById('in-br').value = votosGlobais.white || 0;
        }
        setTimeout(() => clicks = 0, 2000);
    };

    document.getElementById('btnSave').onclick = () => {
        const novosVotos = {
            pt: parseInt(document.getElementById('in-pt').value) || 0,
            pl: parseInt(document.getElementById('in-pl').value) || 0,
            white: parseInt(document.getElementById('in-br').value) || 0
        };
        set(votosRef, novosVotos);
        document.getElementById('admin-panel').style.display = 'none';
    };
</script>

</body>
</html>
